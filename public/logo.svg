<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Radial glow behind torch -->
    <radialGradient id="torchGlow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#00ffae" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#00ffae" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ffae" stop-opacity="0"/>
    </radialGradient>
    <!-- Badge inner shadow -->
    <radialGradient id="badgeFill" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0f2018"/>
      <stop offset="100%" stop-color="#071210"/>
    </radialGradient>
    <!-- Flame gradient (brighter at tips) -->
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#00ffae"/>
      <stop offset="40%" stop-color="#00ffae"/>
      <stop offset="100%" stop-color="#b0ffe0"/>
    </linearGradient>
    <!-- Inner flame gradient -->
    <linearGradient id="flameInner" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#00ffae"/>
      <stop offset="100%" stop-color="#d0fff0"/>
    </linearGradient>
    <!-- Outer ring glow -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="90%" stop-color="#00ffae" stop-opacity="0"/>
      <stop offset="96%" stop-color="#00ffae" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ffae" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="250" fill="url(#ringGlow)"/>

  <!-- Dark badge background -->
  <circle cx="256" cy="256" r="235" fill="url(#badgeFill)"/>
  <circle cx="256" cy="256" r="235" stroke="#00ffae" stroke-width="2" stroke-opacity="0.15"/>

  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="210" stroke="#0a3020" stroke-width="3" stroke-opacity="0.6"/>

  <!-- Torch glow aura -->
  <ellipse cx="256" cy="230" rx="140" ry="170" fill="url(#torchGlow)"/>

  <!-- === FLAME === -->
  <!-- Outer flame silhouette — large flowing multi-tongue shape -->
  <path d="
    M 256 80
    C 248 95, 230 115, 225 135
    C 218 160, 210 170, 200 175
    C 190 182, 195 165, 200 148
    C 195 158, 185 175, 185 190
    C 185 205, 195 218, 200 225
    C 205 232, 210 238, 215 245
    L 215 250
    L 297 250
    L 297 245
    C 302 238, 306 232, 310 222
    C 318 208, 322 190, 316 172
    C 312 158, 300 140, 295 128
    C 290 115, 285 108, 282 100
    C 278 90, 268 82, 256 80
    Z"
    fill="url(#flameGrad)" fill-opacity="0.45"/>

  <!-- Middle flame layer — slightly smaller, brighter -->
  <path d="
    M 256 95
    C 250 108, 240 125, 234 142
    C 228 162, 222 178, 220 192
    C 218 206, 222 220, 228 232
    C 232 238, 236 244, 240 250
    L 272 250
    C 276 244, 280 238, 284 230
    C 290 218, 294 205, 292 188
    C 290 172, 282 155, 275 140
    C 270 128, 264 112, 256 95
    Z"
    fill="url(#flameGrad)" fill-opacity="0.65"/>

  <!-- Flame tongue — left wisp curving right -->
  <path d="
    M 240 115
    C 232 130, 218 148, 212 158
    C 205 170, 208 155, 215 140
    C 220 128, 232 112, 240 100
    Z"
    fill="#b0ffe0" fill-opacity="0.3"/>

  <!-- Flame tongue — right accent -->
  <path d="
    M 268 108
    C 278 125, 295 145, 300 160
    C 305 172, 300 162, 290 148
    C 280 135, 272 118, 268 108
    Z"
    fill="#b0ffe0" fill-opacity="0.2"/>

  <!-- Core flame — brightest center -->
  <path d="
    M 256 115
    C 252 130, 245 150, 242 170
    C 240 188, 242 205, 246 220
    C 248 228, 250 240, 252 250
    L 260 250
    C 262 240, 264 228, 266 220
    C 270 205, 272 188, 270 170
    C 268 150, 262 132, 256 115
    Z"
    fill="url(#flameInner)" fill-opacity="0.85"/>

  <!-- Bright flame tip highlight -->
  <path d="
    M 256 90
    C 253 100, 250 115, 249 130
    C 248 142, 250 138, 253 125
    C 255 115, 257 105, 256 90
    Z"
    fill="#e0fff4" fill-opacity="0.5"/>

  <!-- === TORCH CUP === -->
  <!-- Wide trapezoid cup holding the flame -->
  <path d="
    M 210 250
    C 210 248, 212 246, 218 246
    L 294 246
    C 300 246, 302 248, 302 250
    L 298 262
    C 296 266, 290 268, 284 268
    L 228 268
    C 222 268, 216 266, 214 262
    Z"
    fill="#00ffae"/>

  <!-- Cup highlight -->
  <path d="
    M 218 248
    L 294 248
    L 292 254
    L 220 254
    Z"
    fill="#b0ffe0" fill-opacity="0.3"/>

  <!-- === HANDLE === -->
  <!-- Tapered handle -->
  <path d="
    M 232 268
    L 230 380
    C 230 386, 234 390, 240 392
    L 272 392
    C 278 390, 282 386, 282 380
    L 280 268
    Z"
    fill="#00ffae" fill-opacity="0.9"/>

  <!-- Handle edge highlights -->
  <path d="
    M 234 270
    L 233 378
    C 233 382, 235 384, 238 385
    L 240 385
    L 242 270
    Z"
    fill="#b0ffe0" fill-opacity="0.15"/>

