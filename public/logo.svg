    </g>
  </g>

  <!-- === HANDLE TIP === -->
  <!-- Pointed bottom of handle -->
  <path d="
    M 240 390
    L 256 405
    L 272 390
    Z"
    fill="#00ffae" fill-opacity="0.7"/>
</svg>
